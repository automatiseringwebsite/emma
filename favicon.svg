<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background - Soft pink/peach gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC0CB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bgGradient)" stroke="#FF69B4" stroke-width="2"/>
  
  <!-- Three main hobbies arranged in a triangle -->
  
  <!-- Knutselen (yarn ball) - top left -->
  <g transform="translate(16, 18)">
    <!-- Yarn ball base -->
    <circle cx="10" cy="10" r="9" fill="#FF69B4" stroke="#FF1493" stroke-width="1.5"/>
    <!-- Yarn strands -->
    <path d="M5 5 Q10 8 15 5" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M4 10 Q10 13 16 10" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M5 15 Q10 12 15 15" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.8"/>
    <!-- Yarn end -->
    <path d="M16 6 Q22 10 20 16" stroke="#FF69B4" stroke-width="2" fill="none"/>
    <!-- Sparkles -->
    <circle cx="20" cy="8" r="1.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="6" cy="14" r="1.5" fill="#FFD700" opacity="0.9"/>
  </g>
  
  <!-- Tekenen (paint palette) - top right -->
  <g transform="translate(32, 18)">
    <!-- Palette shape -->
    <path d="M8 16 L6 22 A2 2 0 0 0 8 25 L22 25 A2 2 0 0 0 24 22 L22 16 Z" fill="#FFFFFF" stroke="#FF69B4" stroke-width="1.5"/>
    <ellipse cx="15" cy="18" rx="10" ry="6" fill="#FFFFFF" stroke="#FF69B4" stroke-width="1.5"/>
    <!-- Paint colors -->
    <circle cx="10" cy="17" r="3" fill="#FF6347"/>
    <circle cx="15" cy="15" r="3" fill="#FFD700"/>
    <circle cx="20" cy="17" r="3" fill="#32CD32"/>
    <circle cx="12" cy="20" r="2.5" fill="#4169E1"/>
    <circle cx="18" cy="20" r="2.5" fill="#9370DB"/>
    <!-- Thumb hole -->
    <circle cx="22" cy="20" r="2" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
    <!-- Paint brush -->
    <path d="M2 8 Q5 5 8 8 L6 10 Z" fill="#8B4513"/>
    <path d="M6 10 L6 14 Q6 16 4 16" stroke="#FF69B4" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Haken (crochet hook with yarn) - bottom center -->
  <g transform="translate(24, 38)">
    <!-- Crochet hook handle -->
    <rect x="12" y="14" width="6" height="12" rx="2" fill="#C0C0C0" stroke="#A9A9A9" stroke-width="1"/>
    <!-- Hook part -->
    <path d="M15 14 L15 8 Q15 4 12 4 Q8 4 8 8" stroke="#C0C0C0" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Yarn on hook -->
    <path d="M8 8 Q12 6 16 8" stroke="#FF69B4" stroke-width="2.5" fill="none"/>
    <path d="M16 8 Q20 10 18 14" stroke="#FF69B4" stroke-width="2" fill="none"/>
    <!-- Yarn loop -->
    <path d="M8 8 Q6 12 10 14" stroke="#FF69B4" stroke-width="1.5" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Sparkles around -->
  <circle cx="32" cy="8" r="1.5" fill="#FFD700" opacity="0.9"/>
  <circle cx="56" cy="32" r="1.5" fill="#FFD700" opacity="0.9"/>
  <circle cx="32" cy="56" r="1.5" fill="#FFD700" opacity="0.9"/>
  <circle cx="8" cy="32" r="1.5" fill="#FFD700" opacity="0.9"/>
  
  <!-- Shine effect -->
  <ellipse cx="18" cy="16" rx="4" ry="3" fill="white" opacity="0.4"/>
</svg>