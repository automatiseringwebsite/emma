<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Heart shape background with gradient -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heart shape -->
  <path d="M32 56 
           C12 40 4 28 4 18 
           C4 8 12 2 18 6 
           C24 10 28 16 32 16 
           C36 16 40 10 46 6 
           C52 2 60 8 60 18 
           C60 28 52 40 32 56 Z" 
        fill="url(#heartGradient)" 
        stroke="#C71585" 
        stroke-width="2"
        filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.2))"/>
  
  <!-- Three hobbies inside the heart -->
  
  <!-- Knutselen (yarn ball) - top left of heart -->
  <g transform="translate(14, 16)">
    <!-- Yarn ball -->
    <circle cx="6" cy="6" r="5" fill="#FFD700" stroke="#FF8C00" stroke-width="1"/>
    <!-- Yarn strands -->
    <path d="M2 4 Q6 6 10 4" stroke="#FF69B4" stroke-width="1" fill="none" opacity="0.8"/>
    <path d="M3 8 Q6 10 9 8" stroke="#FF69B4" stroke-width="1" fill="none" opacity="0.8"/>
    <path d="M4 6 Q6 4 8 6" stroke="#FF69B4" stroke-width="1" fill="none" opacity="0.8"/>
    <!-- Yarn end -->
    <path d="M11 5 Q14 6 13 9" stroke="#FF69B4" stroke-width="1.5" fill="none"/>
    <!-- Sparkle -->
    <circle cx="12" cy="4" r="1" fill="#FFD700" opacity="1"/>
  </g>
  
  <!-- Tekenen (paint palette) - top right of heart -->
  <g transform="translate(34, 14)">
    <!-- Small palette -->
    <ellipse cx="10" cy="8" rx="7" ry="4" fill="#FFFFFF" stroke="#FF69B4" stroke-width="1.5"/>
    <!-- Paint colors -->
    <circle cx="6" cy="7" r="2" fill="#FF6347"/>
    <circle cx="10" cy="6" r="2" fill="#FFD700"/>
    <circle cx="14" cy="7" r="2" fill="#32CD32"/>
    <circle cx="7" cy="9" r="1.5" fill="#4169E1"/>
    <!-- Thumb hole -->
    <circle cx="15" cy="8" r="1.2" fill="#FF69B4" opacity="0.6"/>
  </g>
  
  <!-- Haken (crochet hook) - bottom center of heart -->
  <g transform="translate(24, 38)">
    <!-- Hook handle -->
    <rect x="6" y="6" width="4" height="8" rx="1" fill="#C0C0C0" stroke="#A9A9A9" stroke-width="0.5"/>
    <!-- Hook part -->
    <path d="M8 6 L8 3 Q8 1 6 1 Q4 1 4 3" stroke="#C0C0C0" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Yarn on hook -->
    <path d="M4 3 Q6 2 8 3" stroke="#FF69B4" stroke-width="1.5" fill="none"/>
    <path d="M8 3 Q10 4 9 6" stroke="#FF69B4" stroke-width="1" fill="none"/>
    <!-- Yarn loop -->
    <path d="M4 3 Q3 5 5 6" stroke="#FF69B4" stroke-width="0.8" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Sparkles around the heart -->
  <circle cx="16" cy="20" r="1.2" fill="#FFD700" opacity="0.9"/>
  <circle cx="48" cy="24" r="1.2" fill="#FFD700" opacity="0.9"/>
  <circle cx="32" cy="52" r="1.2" fill="#FFD700" opacity="0.9"/>
  <circle cx="20" cy="44" r="0.8" fill="#FFD700" opacity="0.7"/>
  <circle cx="44" cy="44" r="0.8" fill="#FFD700" opacity="0.7"/>
  
  <!-- Shine effect -->
  <ellipse cx="14" cy="16" rx="3" ry="2" fill="white" opacity="0.4"/>
</svg>